name: Mobile App Audit & Quality Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Unit Tests & TypeScript Check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: TypeScript check
        run: pnpm check
        continue-on-error: true
      
      - name: Run unit tests
        run: pnpm test
        continue-on-error: true
      
      - name: Run linter
        run: pnpm lint
        continue-on-error: true
